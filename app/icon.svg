<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2F8E"/>
      <stop offset="100%" stop-color="#131F63"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EBF6"/>
    </linearGradient>
  </defs>

  <!-- Brand-blue rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Pink accent swoosh (from the Hetheya logo) -->
  <path d="M 96 150 Q 256 90, 416 150" stroke="#D8379B" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Milk drop mark -->
  <g transform="translate(124, 96) scale(2.2)">
    <path d="M 60 10 C 60 10, 20 70, 20 110 C 20 135, 38 152, 60 152 C 82 152, 100 135, 100 110 C 100 70, 60 10, 60 10 Z" fill="url(#drop)"/>
    <ellipse cx="42" cy="98" rx="9" ry="20" fill="#FFFFFF" opacity="0.65"/>
    <ellipse cx="38" cy="88" rx="4" ry="8" fill="#FFFFFF" opacity="0.95"/>
  </g>
</svg>
